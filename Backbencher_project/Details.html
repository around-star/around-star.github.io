<div style="text-align: center;"><h2>Physics 1-(BS-PH101)</h2></div>
  
      <div mbsc-form class="container demo-segmented">
        <div class=" mbsc-form-group">
            
            <label>
                Syllabus
                <input mbsc-segmented type="radio" name="range" id="aa" checked>
            </label>
            <label>
                Study Material
                <input mbsc-segmented type="radio" name="range" id="bb">
            </label>
            <label>
                Video Tutorial
                <input mbsc-segmented type="radio" name="range" id="cc">
            </label>
            <label>
                Question Paper
                <input mbsc-segmented type="radio" name="range" id="dd">
            </label>

            <label>
                Suggestion
                <input mbsc-segmented type="radio" name="range" id="ee">
            </label>

        </div>
    </div>


    <div class="container p-3" id="a">
        <div class="progress">
            <div class="progress-bar" style="width:20%"></div>
        </div>
    </div>

    <div class="container p-3" style="display: none;" id="b">
        <div class="progress">
            <div class="progress-bar" style="width:40%"></div>
        </div>
    </div>
    <div class="container p-3" style="display:none; ;" id="c">
        <div class="progress">
            <div class="progress-bar" style="width:60%"></div>
        </div>
    </div>
    <div class="container p-3" style="display:none; ;" id="d">
        <div class="progress">
            <div class="progress-bar" style="width:80%"></div>
        </div>
    </div>
    <div class="container p-3" style="display:none; " id="e">
        <div class="progress">
            <div class="progress-bar" style="width:100%"></div>
        </div>
    </div>
    
    <script type="text/javascript">
        $(document).ready(function(){
            $('#aa').click(function(){
                $('#a').show()
                $('#b').hide()
                $('#c').hide()
                $('#d').hide()
                $('#e').hide()

            })
        })
        $(document).ready(function(){
            $('#bb').click(function(){
                $('#b').show();
                $('#a').hide();
                $('#c').hide();
                $('#d').hide();
                $('#e').hide();
            });
        });
        $(document).ready(function(){
            $('#cc').click(function(){
                $('#c').show();
                $('#a').hide();
                $('#b').hide();
                $('#d').hide();
                $('#e').hide();

            });
        });
        $(document).ready(function(){
            $('#dd').click(function(){
                $('#d').show();
                $('#a').hide();
                $('#b').hide();
                $('#c').hide();
                $('#e').hide();
            });
        });
        $(document).ready(function(){
            $('#ee').click(function(){
                $('#e').show();
                $('#a').hide();
                $('#b').hide();
                $('#c').hide();
                $('#d').hide();
            });
        });

    </script>
